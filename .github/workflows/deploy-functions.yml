name: Deploy Cloud Functions

on:
  push:
    branches: [main]
    paths:
      - 'backend/functions/**'
      - 'firestore.rules'
      - 'firebase.json'

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy to Firebase (asia-south1)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: backend/functions/package-lock.json

      - name: Install function dependencies
        working-directory: backend/functions
        run: npm ci

      - name: Install Firebase CLI
        run: npm install -g firebase-tools@latest

      - name: Write service account key
        run: echo "$FIREBASE_SERVICE_ACCOUNT_JSON" > /tmp/sa.json
        env:
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}

      - name: Deploy Cloud Functions + Firestore rules
        run: firebase deploy --only functions,firestore:rules --project velocity-fe379 --non-interactive
        env:
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/sa.json
