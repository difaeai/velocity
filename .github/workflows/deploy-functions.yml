name: Deploy Cloud Functions

on:
  push:
    branches: [main]
    paths:
      - 'backend/functions/**'
      - 'firestore.rules'
      - 'storage.rules'
      - 'firebase.json'

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    name: Deploy to Firebase (asia-south1)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: backend/functions/package-lock.json

      - name: Install function dependencies
        working-directory: backend/functions
        run: npm ci

      - name: Install Firebase CLI
        run: npm install -g firebase-tools@latest

      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}

      - name: Deploy Cloud Functions + Firestore rules + Storage rules
        run: firebase deploy --only functions,firestore:rules,storage --project velocity-fe379 --non-interactive
