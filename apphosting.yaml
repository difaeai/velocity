# Firebase App Hosting configuration.
#
# The Next.js admin app lives at the repository ROOT, so App Hosting detects and
# builds it automatically with the default backend root directory (`/`) — no
# console changes required. The other workspaces (apps/mobile, backend, tests)
# are separate packages App Hosting ignores.

runConfig:
  cpu: 1
  memoryMiB: 512
  maxInstances: 2
  minInstances: 0
  concurrency: 80

# The Firebase Web config (apiKey, appId, …) is injected automatically by App
# Hosting as FIREBASE_WEBAPP_CONFIG. The admin app also has safe NEXT_PUBLIC_*
# fallbacks, so no secrets are required here.
